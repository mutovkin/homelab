# Lyrion Music Server (LMS)
#
# Host networking is required — LMS relies on UDP broadcast on port 3483
# for Squeezebox/Squeezelite player discovery. Docker bridge networking
# does not forward broadcast packets, so players (e.g. WiiM) cannot find
# the server unless the container shares the host's network stack.
#
# Ports (bound directly on host):
#   9001/TCP  — Web UI (HTTP_PORT, configurable via LMS_WEB_PORT)
#   9090/TCP  — CLI / JSON-RPC interface
#   3483/TCP  — Slimproto player control channel
#   3483/UDP  — Slimproto player discovery (broadcasts)
#
# The /music volume is an NFS mount from TrueNAS over the host-only
# vmbr2 network (10.99.99.x), so music traffic never hits the LAN.

services:
  lms:
    container_name: lms
    hostname: n5pro-docker.lan
    image: lmscommunity/lyrionmusicserver:stable
    restart: unless-stopped
    network_mode: host              # Required for UDP broadcast discovery
    security_opt:
      - "apparmor:unconfined"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - HTTP_PORT=${LMS_WEB_PORT}
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-America/Los_Angeles}
      - EXTRA_ARGS=--advertiseaddr=${LMS_ADVERTISE_ADDR}
    volumes:
      - ${LMS_CONFIG_DIR}:/config
      - lms_music:/music:ro        # NFS volume — read-only music library
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${LMS_WEB_PORT} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  lms_music:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${LMS_NFS_ADDR},nfsvers=4,ro,soft,timeo=100,retrans=3"
      device: ":${LMS_NFS_PATH}"
