services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    security_opt:
      - "apparmor:unconfined"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "18080:8080"
    volumes:
      - /data/searxng/config:/etc/searxng
      - /data/searxng/data:/var/cache/searxng
      # Persistent favicon cache. Kept OUTSIDE /var/cache/searxng because the
      # entrypoint force-chowns that to 977, but the worker runs as root — so a
      # root-owned dir here stays writable by the worker and survives recreates.
      - /data/searxng/favicons:/var/cache/searxng-favicons
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    networks:
      - searxng_network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  searxng_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${SEARXNG_NETWORK_SUBNET:-172.22.0.0/24}