# SearXNG favicon config. Required once `search.favicon_resolver` is set —
# without this file searxng logs "missing favicon config" and serves favicons
# as HTTP 404. Cache lives on the persistent /var/cache/searxng volume so it
# survives container recreation. Resolvers (duckduckgo/google/...) are
# registered by default; we only override the cache location + limits.
[favicons]
cfg_schema = 1

[favicons.cache]
db_url = "/var/cache/searxng/faviconcache.db"
HOLD_TIME = 2592000          # 30 days
LIMIT_TOTAL_BYTES = 1073741824  # 1 GB
MAINTENANCE_MODE = "auto"
