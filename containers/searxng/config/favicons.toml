# SearXNG favicon config. Required once `search.favicon_resolver` is set — else
# searxng logs "missing favicon config" and favicons 404.
#
# db_url points at a dedicated, root-owned, PERSISTENT bind mount
# (/var/cache/searxng-favicons). It must live OUTSIDE /var/cache/searxng: the
# entrypoint force-chowns that volume to 977, but the worker runs as root
# WITHOUT DAC_OVERRIDE (cap_drop: ALL), so it can't write a 977-owned dir —
# pointing the cache there 500s every search (#63). A sibling root-owned mount
# is writable by the root worker and survives container recreates (#67).
[favicons]
cfg_schema = 1

[favicons.cache]
db_url = "/var/cache/searxng-favicons/faviconcache.db"
