# SearXNG settings — MINIMAL config.
#
# We intentionally do NOT ship the full upstream settings.yml: pinning the
# entire engine catalog drifts from the image on every update, leaving engines
# whose modules were removed/renamed failing to load ("Cannot load engine ...",
# 11 of them as of #50). `use_default_settings: true` inherits the installed
# image's own defaults, so engine definitions always track the running version.
# Only project-specific overrides live below.
#
# Ansible deploys a templated copy of this config to /data/searxng/config/ (with
# the braveapi engine, key sourced from the host — never committed) via the
# searxng role. For standalone `docker compose up`, this file is used as-is.
use_default_settings:
  engines:
    remove:
      # Onion engines need a Tor proxy we don't run — disabling still triggers a
      # load error, so remove them from the image defaults entirely.
      - ahmia
      - torch
      # Free Brave engines scrape search.brave.com and are chronically
      # rate-limited; the paid braveapi engine covers web search, so drop them.
      - brave
      - brave.images
      - brave.videos
      - brave.news

general:
  instance_name: "MutoSearch"

server:
  # Overwritten at runtime by ${SEARXNG_SECRET} (searxng image entrypoint).
  secret_key: "ultrasecretkey"
  # Single internal instance behind a reverse proxy — no public rate limiter.
  limiter: false

search:
  # Search-as-you-type suggestions and per-result site favicons (favicons.toml
  # ships alongside this file; cache lives in the worker-writable /tmp).
  autocomplete: "duckduckgo"
  favicon_resolver: "duckduckgo"
  # html for the UI, json so the search API can be queried programmatically.
  formats:
    - html
    - json

ui:
  # Open result links in a new browser tab.
  results_on_new_tab: true
