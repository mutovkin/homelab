services:
  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    security_opt:
      - "apparmor:unconfined"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${WATCHTOWER_TIMEZONE}
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "false"
      WATCHTOWER_TIMEOUT: 30s
      # Notifications
      WATCHTOWER_NOTIFICATIONS: "email"
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: ${EMAIL_FROM}
      WATCHTOWER_NOTIFICATION_EMAIL_TO: ${EMAIL_TO}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: ${EMAIL_SERVER}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: ${EMAIL_PORT}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: ${EMAIL_USER}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD: ${EMAIL_PASSWORD}
      WATCHTOWER_NOTIFICATION_EMAIL_DELAY: 2
    networks:
      - watchtower_network

networks:
  watchtower_network:
    driver: bridge
    name: watchtower_network
    ipam:
      driver: default
      config:
        - subnet: ${WATCHTOWER_NETWORK_SUBNET:-172.25.0.0/24}
