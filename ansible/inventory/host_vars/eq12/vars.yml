---
# Beelink EQ12 (AZW) — host-specific variables
# CPU: Intel N100 (4c/4t, Alder Lake-N)
# RAM: 16GB (single DIMM)
# NVMe: 1× 2TB TEAMGROUP TM8FP4002T
# Net: 2× Intel I225-V 2.5GbE (enp2s0 → vmbr0)

# Proxmox
proxmox_node: pve
proxmox_api_url: "https://{{ ansible_host }}:8006"

# Hardware
total_ram_gb: 16

# Storage
zfs_pool: rpool
data_mount: /data

# Network
proxmox_bridge: vmbr0

# Services to deploy on this host's Docker LXC (CT 101)
# Each entry corresponds to an Ansible role in roles/services/
services:
  - postgresql
  - observability
  - vaultwarden
  - searxng
  - joplin
  - portainer
  - watchtower

# Docker network subnets (must match compose files)
docker_networks:
  observability: "172.20.0.0/24"
  postgresql: "172.21.0.0/24"
  searxng: "172.22.0.0/24"
  portainer: "172.23.0.0/24"
  vaultwarden: "172.24.0.0/24"
  watchtower: "172.25.0.0/24"
