---
# Minisforum N5 Pro — host-specific variables
# CPU: AMD Ryzen AI 9 HX PRO 370 (12c/24t)
# RAM: 96GB DDR5-5600 ECC (32GB GPU UMA, ~62GB for Proxmox)
# NVMe: 1×4TB + 2×2TB WD Black SN850X | HDD: 5×26TB Seagate Exos
# GPU: Radeon 890M | NPU: Strix Halo | Net: 10GbE + 5GbE

# Proxmox
proxmox_node: n5pro
proxmox_api_url: "https://{{ ansible_host }}:8006"

# Hardware
total_ram_gb: 96
gpu_ram_gb: 32 # Allocated in BIOS to iGPU (UMA)
system_ram_gb: 62 # Available to Proxmox (~62GB after UMA)

# ── GPU Sharing (LXC device passthrough) ─────────────────────────────────────
#
# Modern approach (Proxmox 9 / kernel 6.17+):
#   The inbox amdgpu kernel driver handles the GPU. The host only needs
#   pve-firmware + udev rules (managed by the proxmox_host role).
#   NO ROCm installation on the Proxmox host.
#
#   ROCm userspace is installed inside the LXC container by the docker_host
#   role during configure-guests.yml (amdgpu-install --no-dkms).
#
# How it works:
#   Host: amdgpu driver → /dev/dri + /dev/kfd exist
#   LXC:  bind-mount /dev/dri + /dev/kfd → ROCm userspace talks to devices
#   Docker: --device /dev/dri --device /dev/kfd + HSA_OVERRIDE_GFX_VERSION
#
# Hardware reference (for diagnostics, not used by Ansible):
#   GPU:   Radeon 890M — PCI c7:00.0 (1002:150e) — IOMMU group 23
#   Audio: HDMI/DP     — PCI c7:00.1 (1002:1640) — IOMMU group 24
#   UMA:   32 GB allocated in BIOS
#
# Reference: docs/n5pro.md § GPU Passthrough
# ─────────────────────────────────────────────────────────────────────────────
gpu_sharing:
  enabled: true

# ── NPU Passthrough ─────────────────────────────────────────────────────────
# AMD Strix Halo Neural Processing Unit — available for AI workloads.
# Not yet assigned to any VM/CT. Can be passed via hostpci (VM) or
# cgroup device allow (LXC) once a workload needs it.
npu_pci_address: "c8:00.1" # IOMMU group 30
npu_device_id: "1022:17f0"

# === NUT (Network UPS Tools) — server ===
# Goldenmate 1500VA UPS connected via USB
nut_role: "server"
nut_server:
  ups_name: "goldenmate"
  listen_address: "0.0.0.0"
  listen_port: 3493
  shutdowncmd: "/sbin/shutdown -h +0"
  powerdownflag: "/etc/killpower"
  ups:
    driver: "usbhid-ups"
    port: "auto"
    desc: "Goldenmate 1500VA"
    vendorid: "075d"
    productid: "0300"
    ignorelb: true
    override_battery_charge_low: "30"

# SATA controller passthrough (for TrueNAS VM)
sata_controller_pci: "c1:00.0" # JMicron JMB58x, IOMMU group 17 — 5× 26TB HDDs

# Storage
zfs_pool: rpool # 4TB NVMe boot disk
data_mount: /data

# Network
proxmox_bridge: vmbr1 # 10GbE (Aquantia AQC113) — primary management
proxmox_bridge_secondary: vmbr0 # 5GbE (Realtek RTL8126) — DHCP internet

# Host-only bridge for NFS traffic (TrueNAS <-> Docker LXC)
# No physical NIC attached — traffic stays in RAM, never hits the network
hostonly_bridge: vmbr2
hostonly_host_ip: "10.99.99.1"
hostonly_host_netmask: "255.255.255.0"

# === VM/LXC Definitions (managed by proxmox_guests role) ===
# Ported from infrastructure/machines/n5pro.ts

proxmox_vms:
  - vmid: 200
    name: truenas
    cores: 4
    memory: 24576
    ide:
      ide2: "local:iso/{{ truenas_iso_filename }},media=cdrom"
    scsi:
      scsi0: "local-zfs:64,format=raw"
    bios: ovmf
    machine: q35
    vga: virtio
    efidisk0:
      storage: local-zfs
      format: raw
      efitype: 4m
      pre_enrolled_keys: false
    hostpci:
      hostpci0: "mapping=truenas_sata,pcie=1" # JMicron SATA controller via Proxmox Resource Mapping
      hostpci1: "mapping=truenas_nvme0,pcie=1" # WD SN850X 2TB NVMe (c6:00.0) for mirrored special vdev
      hostpci2: "mapping=truenas_nvme1,pcie=1" # WD SN850X 2TB NVMe (c3:00.0) for mirrored special vdev
    net_bridge: vmbr1
    net:
      net0: "virtio,bridge=vmbr1"
      net1: "virtio,bridge=vmbr2"
    startup: "order=1"
    onboot: true
    started: true
    tags:
      - truenas
      - storage
    description: >-
      TrueNAS SCALE — NAS and storage management.
      JMicron SATA controller passed through for direct access to 5x 26TB HDDs.
      2x WD SN850X 2TB NVMe passed through for mirrored ZFS special vdev.
      net0: vmbr1 (10GbE LAN), net1: vmbr2 (host-only NFS). Boots first (order=1).

proxmox_lxcs:
  - vmid: 201
    hostname: n5pro-docker
    os: ubuntu-24.04
    cores: 8
    memory: 24576 # 24GB — Immich + Frigate + NextCloud + overhead
    root_disk_size: 24
    storage: local-zfs
    unprivileged: false # required: host GID 993 (render) must pass through for /dev/kfd ROCm access
    mounts:
      mp0: "local-zfs:200,mp=/data"
    netif:
      net0: "name=eth0,bridge=vmbr1,gw=192.168.23.1,hwaddr=BC:24:11:FC:95:51,ip=192.168.30.15/18,type=veth"
      net1: "name=eth1,bridge=vmbr2,hwaddr=BC:24:11:FC:95:52,ip=10.99.99.3/24,type=veth"
    nesting: true
    nfs_enabled: true
    startup: "order=2,up=60"
    gpu_sharing: true # /dev/dri + /dev/kfd bind-mount for VAAPI and ROCm
    onboot: true
    started: true
    tags:
      - docker
    description: >-
      Docker host — Immich, Frigate, NextCloud, PostgreSQL, Lyrion.
      net0: vmbr1 (LAN), net1: vmbr2 (host-only NFS).
      Boots after TrueNAS (order=2, up=60).
