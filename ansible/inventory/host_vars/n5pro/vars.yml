---
# Minisforum N5 Pro — host-specific variables
# CPU: AMD Ryzen AI 9 HX PRO 370 (12c/24t)
# RAM: 96GB DDR5-5600 ECC (32GB GPU UMA, ~62GB for Proxmox)
# NVMe: 1×4TB + 2×2TB WD Black SN850X | HDD: 5×26TB Seagate Exos
# GPU: Radeon 890M | NPU: Strix Halo | Net: 10GbE + 5GbE

# Proxmox
proxmox_node: n5pro
proxmox_api_url: "https://{{ ansible_host }}:8006"

# Hardware
total_ram_gb: 96
gpu_ram_gb: 32 # Allocated in BIOS to iGPU (UMA)
system_ram_gb: 62 # Available to Proxmox (~62GB after UMA)

# ── GPU Passthrough ──────────────────────────────────────────────────────────
#
# There are TWO different GPU passthrough approaches in Proxmox:
#
#   1. VFIO-PCI passthrough (for VMs)
#      Binds the GPU to the vfio-pci driver at boot, giving a VM exclusive
#      access to the physical device. The host loses /dev/dri entirely.
#      Requires: IOMMU enabled, vfio modules loaded, vfio-pci ids set.
#
#   2. Device sharing via /dev/dri bind-mount (for LXC containers)
#      The host keeps the amdgpu driver loaded and shares /dev/dri + /dev/kfd
#      into LXC containers. Multiple containers can share the GPU.
#      Requires: amdgpu driver + ROCm on the host, udev rules, cgroup allow.
#
# ⚠ THESE ARE MUTUALLY EXCLUSIVE FOR THE SAME GPU.
#   If vfio-pci claims the Radeon 890M, /dev/dri won't exist on the host
#   and CT 201 (n5-docker) can't use it for VAAPI/ROCm.
#
# Current choice: LXC device sharing (approach 2)
#   CT 201 needs /dev/dri for Frigate (VAAPI) and Immich (ROCm ML).
#   VFIO-PCI is disabled — enable it only if you want a dedicated GPU VM
#   instead of LXC GPU sharing.
#
# ROCm installation layers:
#   - Proxmox host: full ROCm install (kernel driver amdgpu + userspace)
#     → Run: proxmox-gpu-setup-scripts/host/003 - install-amd-drivers.sh
#     → Run: proxmox-gpu-setup-scripts/host/007 - setup-udev-gpu-rules.sh
#   - Inside LXC: ROCm userspace libraries only (NO kernel/DKMS modules)
#     → Run: proxmox-gpu-setup-scripts/lxc/install-docker-and-amd-drivers-in-lxc.sh
#
# References:
#   - Setup scripts: https://github.com/mutovkin/proxmox-gpu-setup-scripts
#   - Hardware details: docs/n5pro.md § GPU Passthrough
#   - IOMMU groups: docs/n5pro.md § IOMMU Groups
#
# ─────────────────────────────────────────────────────────────────────────────

# Kernel-level IOMMU and VFIO-PCI configuration (proxmox_host role).
# Currently disabled — the amdgpu driver stays loaded so LXCs can share /dev/dri.
# Set enabled: true + uncomment vfio_pci_ids to switch to exclusive VM passthrough.
gpu_passthrough:
  enabled: false  # flip to true only for dedicated GPU VM (disables LXC GPU sharing)
  iommu: true     # IOMMU is still needed even for LXC device sharing
  # vfio_pci_ids: "1002:150e,1002:1640"  # uncomment to claim GPU for VFIO-PCI
  gpu_pci_address: "c7:00.0"   # Radeon 890M — IOMMU group 23
  audio_pci_address: "c7:00.1" # HDMI/DP audio — IOMMU group 24 (device ID 1002:1640)
  kernel_params:
    - "amd_iommu=on"
    - "iommu=pt"

# ── NPU Passthrough ─────────────────────────────────────────────────────────
# AMD Strix Halo Neural Processing Unit — available for AI workloads.
# Not yet assigned to any VM/CT. Can be passed via hostpci (VM) or
# cgroup device allow (LXC) once a workload needs it.
npu_pci_address: "c8:00.1"  # IOMMU group 30
npu_device_id: "1022:17f0"

# SATA controller passthrough (for TrueNAS VM)
sata_controller_pci: "c1:00.0" # JMicron JMB58x, IOMMU group 17 — 5× 26TB HDDs

# Storage
zfs_pool: rpool # 4TB NVMe boot disk
data_mount: /data

# Network
proxmox_bridge: vmbr1 # 10GbE (Aquantia AQC113) — primary management
proxmox_bridge_secondary: vmbr0 # 5GbE (Realtek RTL8126) — DHCP internet

# === VM/LXC Definitions (managed by proxmox_guests role) ===
# Ported from infrastructure/machines/n5pro.ts

proxmox_vms:
  - vmid: 200
    name: truenas
    cores: 4
    memory: 16384
    scsi:
      scsi0: "local-zfs:32,format=raw"
    bios: ovmf
    machine: q35
    efidisk0:
      storage: local-zfs
      format: raw
      efitype: 4m
      pre_enrolled_keys: false
    hostpci:
      hostpci0: "0000:c1:00.0,pcie=1"  # JMicron SATA controller — 5× 26TB HDDs
    net_bridge: vmbr1
    onboot: true
    started: true
    tags:
      - truenas
      - storage
    description: "TrueNAS SCALE — NAS and storage management. JMicron SATA controller passed through for direct access to 5× 26TB HDDs."

proxmox_lxcs:
  - vmid: 201
    hostname: n5-docker
    ostemplate: "local:vztmpl/debian-13-standard_13.0-1_amd64.tar.zst"
    cores: 8
    memory: 24576  # 24GB — Immich + Frigate + NextCloud + overhead
    root_disk_size: 8
    storage: local-zfs
    mounts:
      mp0: "local-zfs:200,mp=/data"
    net_bridge: vmbr1
    nesting: true
    gpu_passthrough: true  # /dev/dri for VAAPI (Frigate, Immich ML)
    onboot: true
    started: true
    tags:
      - docker
    description: "Docker host for N5 Pro services — Immich, Frigate, NextCloud, PostgreSQL"
