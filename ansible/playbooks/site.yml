---
# Master playbook — runs all Ansible-managed steps in order
# NOTE: This does NOT run Pulumi. For a full rebuild, use:
#   1. ansible-playbook playbooks/proxmox-hosts.yml
#   2. cd infrastructure && pulumi up
#   3. ansible-playbook playbooks/configure-guests.yml
#   4. ansible-playbook playbooks/deploy-services.yml
# Or simply: task deploy:full (which runs all 4 steps including Pulumi)

- name: Configure Proxmox hosts
  ansible.builtin.import_playbook: proxmox-hosts.yml

- name: Configure Docker guests
  ansible.builtin.import_playbook: configure-guests.yml

- name: Deploy services
  ansible.builtin.import_playbook: deploy-services.yml
