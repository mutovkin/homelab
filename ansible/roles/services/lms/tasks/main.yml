---
- name: Create Lyrion deploy directory
  ansible.builtin.file:
    path: "{{ data_mount }}/deploy/lyrion"
    state: directory
    mode: "0755"

- name: Synchronize Lyrion compose files
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../containers/lyrion/"
    dest: "{{ data_mount }}/deploy/lyrion/"
    delete: false
    rsync_opts:
      - "--exclude=.env"
      - "--exclude=.env.example"
      - "--exclude=README.md"

- name: Template Lyrion .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ data_mount }}/deploy/lyrion/.env"
    mode: "0600"

- name: Create Lyrion data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ data_mount }}/lyrion/config"

# The LMS image runs /config/custom-init.sh on every container start (its
# sanctioned extension hook). ffmpeg is needed for transcoding but isn't in the
# base image. Guard the install so a normal restart is a fast no-op instead of an
# apt-get update + install every boot (slow, network-dependent, and noisy).
- name: Install ffmpeg via custom-init.sh (idempotent — skips if already present)
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      # Managed by Ansible — installs ffmpeg once; no-op on subsequent starts.
      if ! command -v ffmpeg >/dev/null 2>&1; then
        apt-get update -qq
        apt-get install --no-install-recommends -qy ffmpeg
      fi
    dest: "{{ data_mount }}/lyrion/config/custom-init.sh"
    mode: "0755"

# Self-heal: if the LXC boots before TrueNAS NFS is serving (boot-order race,
# #36), the NFS-backed /music volume fails to mount and the stack stays down.
# This oneshot waits for NFS then re-ups the stack, independent of boot order.
- name: Install lms NFS self-heal script
  ansible.builtin.template:
    src: lms-nfs-heal.sh.j2
    dest: /usr/local/bin/lms-nfs-heal.sh
    mode: "0755"

- name: Install lms NFS self-heal systemd unit
  ansible.builtin.template:
    src: lms-nfs-heal.service.j2
    dest: /etc/systemd/system/lms-nfs-heal.service
    mode: "0644"
  register: lms_heal_unit

- name: Enable lms NFS self-heal unit (runs at every boot)
  ansible.builtin.systemd_service:
    name: lms-nfs-heal.service
    enabled: true
    daemon_reload: "{{ lms_heal_unit.changed }}"

# If the compose file name/list changes here, update COMPOSE_FILE in
# lms-nfs-heal.sh.j2 too — the self-heal unit re-ups the stack independently.
- name: Deploy Lyrion stack
  community.docker.docker_compose_v2:
    project_src: "{{ data_mount }}/deploy/lyrion"
    files:
      - lyrion.yml
    state: present
    pull: always
