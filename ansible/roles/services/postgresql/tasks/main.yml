---
- name: Create PostgreSQL deploy directory
  ansible.builtin.file:
    path: "{{ data_mount }}/deploy/postgresql"
    state: directory
    mode: "0755"

- name: Synchronize PostgreSQL compose and config files
  become: false
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../containers/postgresql/"
    dest: "{{ data_mount }}/deploy/postgresql/"
    delete: false
    rsync_opts:
      - "--exclude=.env"
      - "--exclude=.env.example"
      - "--exclude=README.md"
      - "--exclude=backups/"
      - "--exclude=data/"

- name: Template PostgreSQL .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ data_mount }}/deploy/postgresql/.env"
    mode: "0600"

- name: Create PostgreSQL data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ data_mount }}/postgresql/data"
    - "{{ data_mount }}/postgresql/config"
    - "{{ data_mount }}/postgresql/config/pgadmin"

# Pre-create the shared network as EXTERNAL so it persists independent of this
# compose project — when watchtower recreates postgres/pgadmin they reattach to
# the still-present network instead of coming up detached (#45). Idempotent: a
# matching existing network is left as-is.
- name: Ensure shared postgres_network exists (external)
  community.docker.docker_network:
    name: postgres_network
    driver: bridge
    ipam_config:
      - subnet: 172.21.0.0/24
        gateway: 172.21.0.1
    state: present

- name: Deploy PostgreSQL stack
  community.docker.docker_compose_v2:
    project_src: "{{ data_mount }}/deploy/postgresql"
    files:
      - postgresql.yml
    state: present
    pull: always
