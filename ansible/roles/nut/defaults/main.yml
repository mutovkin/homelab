---
# defaults for nut role
# Set nut_role: "server" or "client" in host_vars to enable

nut_role: ""

nut_mode: "{% if nut_role == 'server' %}netserver{% elif nut_role == 'client' %}netclient{% else %}none{% endif %}"

# Server defaults (override in host_vars when nut_role == 'server')
nut_server:
  # Bind upsd to specific addresses, not 0.0.0.0. Default to loopback only;
  # add the host's LAN IP in host_vars so remote clients can connect. Keep
  # 127.0.0.1 so the server's own upsmon (MONITOR ...@localhost) still works.
  listen_addresses:
    - "127.0.0.1"
  listen_port: 3493
  ups_name: "ups"
  shutdowncmd: "/sbin/shutdown -h +0"
  powerdownflag: "/etc/killpower"
  ups:
    driver: "usbhid-ups"
    port: "auto"
    desc: "UPS"
    vendorid: ""
    productid: ""
    ignorelb: false
    override_battery_charge_low: ""

# Firewall: restrict the upsd port to specific client source IPs (defense in
# depth on top of binding to specific addresses). Empty list = no firewall rule
# managed (the role skips it). Loopback is always allowed implicitly. Set in
# host_vars, e.g. nut_allowed_clients: ["192.168.25.5"].
nut_allowed_clients: []

# Client defaults (override in host_vars when nut_role == 'client')
nut_client:
  monitor_ups_name: "ups"
  monitor_host: ""
  shutdowncmd: "/sbin/shutdown -h +0"
  powerdownflag: "/etc/killpower"

# Usernames for upsd.users (passwords come from vault)
nut_users:
  master:
    username: "upsmon_master"
  slave:
    username: "upsmon_slave"
