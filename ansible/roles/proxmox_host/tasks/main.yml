---
- name: Disable Proxmox enterprise repository
  ansible.builtin.apt_repository:
    repo: "deb https://enterprise.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-enterprise"
    state: absent
    filename: pve-enterprise
  when: not proxmox_enterprise_repo

- name: Enable Proxmox no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
    state: present
    filename: pve-no-subscription
  when: not proxmox_enterprise_repo

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Proxmox utilities
  ansible.builtin.apt:
    name:
      - lm-sensors
      - ethtool
      - iotop
    state: present

# --- ZFS ---

- name: Configure ZFS scrub schedule
  ansible.builtin.cron:
    name: "ZFS scrub {{ zfs_pool | default('rpool') }}"
    job: "/sbin/zpool scrub {{ zfs_pool | default('rpool') }}"
    special_time: "{{ proxmox_zfs_scrub_schedule }}"
    user: root
    state: present
  when: zfs_pool is defined

# --- GPU Passthrough (N5 Pro) ---

- name: Configure IOMMU kernel parameters
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: "^GRUB_CMDLINE_LINUX_DEFAULT="
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet {{ gpu_passthrough.kernel_params | join(" ") }}"'
    backup: true
  when: gpu_passthrough.enabled | default(false)
  notify: update-grub

- name: Load vfio modules
  ansible.builtin.lineinfile:
    path: /etc/modules
    line: "{{ item }}"
    state: present
  loop:
    - vfio
    - vfio_iommu_type1
    - vfio_pci
    - vfio_virqfd
  when: gpu_passthrough.enabled | default(false)
  notify: update-initramfs

- name: Configure vfio-pci device IDs
  ansible.builtin.copy:
    content: "options vfio-pci ids={{ gpu_passthrough.vfio_pci_ids }}\n"
    dest: /etc/modprobe.d/vfio.conf
    mode: "0644"
  when:
    - gpu_passthrough.enabled | default(false)
    - gpu_passthrough.vfio_pci_ids is defined
  notify: update-initramfs
