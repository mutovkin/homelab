---
- name: Disable Proxmox enterprise repository
  ansible.builtin.apt_repository:
    repo: "deb https://enterprise.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] }} pve-enterprise"
    state: absent
    filename: pve-enterprise
  when: not proxmox_enterprise_repo

- name: Enable Proxmox no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] }} pve-no-subscription"
    state: present
    filename: pve-no-subscription
  when: not proxmox_enterprise_repo

# --- Subscription nag removal ---

- name: Deploy Proxmox nag removal script
  ansible.builtin.copy:
    src: remove-proxmox-nag.sh
    dest: /usr/local/bin/remove-proxmox-nag.sh
    mode: "0755"
  when: not proxmox_enterprise_repo
  notify: remove-proxmox-nag

- name: Deploy apt hook to re-apply nag removal after package updates
  ansible.builtin.copy:
    content: |
      DPkg::Post-Invoke {
          "if [ -x /usr/local/bin/remove-proxmox-nag.sh ]; then /usr/local/bin/remove-proxmox-nag.sh; fi";
      };
    dest: /etc/apt/apt.conf.d/80-remove-proxmox-nag
    mode: "0644"
  when: not proxmox_enterprise_repo

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Proxmox utilities
  ansible.builtin.apt:
    name:
      - lm-sensors
      - ethtool
      - iotop
    state: present

# --- ZFS ---

- name: Configure ZFS scrub schedule
  ansible.builtin.cron:
    name: "ZFS scrub {{ zfs_pool | default('rpool') }}"
    job: "/sbin/zpool scrub {{ zfs_pool | default('rpool') }}"
    special_time: "{{ proxmox_zfs_scrub_schedule }}"
    user: root
    state: present
  when: zfs_pool is defined

# --- GPU sharing (LXC device passthrough) ---
# Modern approach: kernel 6.17+ has inbox amdgpu driver.
# Host only needs firmware blobs + udev rules. ROCm userspace is installed
# inside the LXC by the docker_host role (configure-guests.yml).

- name: Ensure Proxmox firmware is installed (contains AMD GPU firmware)
  ansible.builtin.apt:
    name: pve-firmware
    state: present
  when: gpu_sharing.enabled | default(false)

- name: Deploy GPU udev rules
  ansible.builtin.copy:
    content: |
      # Managed by Ansible — GPU device permissions for LXC passthrough
      SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="render", MODE="0660"
      KERNEL=="kfd", GROUP="render", MODE="0660"
    dest: /etc/udev/rules.d/70-amdgpu.rules
    mode: "0644"
  when: gpu_sharing.enabled | default(false)
  notify: reload-udev

- name: Ensure root is in render and video groups
  ansible.builtin.user:
    name: root
    groups:
      - render
      - video
    append: true
  when: gpu_sharing.enabled | default(false)

# --- Host-only bridge for NFS traffic ---

- name: Get host-only bridge configuration
  ansible.builtin.command: "pvesh get /nodes/{{ proxmox_node }}/network/{{ hostonly_bridge }} --output-format json"
  register: hostonly_bridge_json
  failed_when: false
  changed_when: false
  when: hostonly_bridge is defined

- name: Set fact for bridge existence and current IP
  vars:
    # pvesh may report the address under 'address' or 'cidr' (e.g. "10.99.99.1/24")
    # depending on the PVE version. Normalize by taking whichever is present and
    # stripping any CIDR suffix so it compares cleanly against the plain
    # hostonly_host_ip (e.g. "10.99.99.1"). Without this the comparison never
    # matches and the network is reconfigured on every run.
    _bridge_cfg: "{{ hostonly_bridge_json.stdout | default('{}') | from_json }}"
    _bridge_addr: "{{ _bridge_cfg.address | default(_bridge_cfg.cidr | default('')) }}"
  ansible.builtin.set_fact:
    hostonly_bridge_exists: "{{ hostonly_bridge_json.rc == 0 }}"
    hostonly_bridge_current_ip: "{{ _bridge_addr | regex_replace('/.*$', '') }}"
  when: hostonly_bridge is defined

- name: Backup /etc/network/interfaces before making changes
  ansible.builtin.copy:
    src: /etc/network/interfaces
    dest: "/etc/network/interfaces.ansible_bak_{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
    mode: "0644"
  when:
    - hostonly_bridge is defined
    - not hostonly_bridge_exists or hostonly_bridge_current_ip != hostonly_host_ip

- name: Create host-only bridge
  ansible.builtin.command: >-
    pvesh create /nodes/{{ proxmox_node }}/network
    -type bridge
    -iface {{ hostonly_bridge }}
    -autostart 1
  changed_when: true
  when:
    - hostonly_bridge is defined
    - not hostonly_bridge_exists

- name: Assign host IP on host-only bridge
  ansible.builtin.command: >-
    pvesh set /nodes/{{ proxmox_node }}/network/{{ hostonly_bridge }}
    -type bridge
    -address {{ hostonly_host_ip }}
    -netmask {{ hostonly_host_netmask }}
  register: hostonly_bridge_ip
  changed_when: true
  when:
    - hostonly_bridge is defined
    - hostonly_bridge_current_ip != hostonly_host_ip

# Applying (reloading) the staged network config. vmbr2 has no physical NIC,
# so reloading it cannot drop the management connection — run synchronously so
# a failed apply surfaces instead of being lost to fire-and-forget.
- name: Apply network configuration
  ansible.builtin.command: "pvesh set /nodes/{{ proxmox_node }}/network"
  register: hostonly_bridge_apply
  changed_when: true
  when:
    - hostonly_bridge is defined
    - not hostonly_bridge_exists or (hostonly_bridge_ip.changed | default(false))
