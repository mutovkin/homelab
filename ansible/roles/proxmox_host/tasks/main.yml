---
- name: Disable Proxmox enterprise repository
  ansible.builtin.apt_repository:
    repo: "deb https://enterprise.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] }} pve-enterprise"
    state: absent
    filename: pve-enterprise
  when: not proxmox_enterprise_repo

- name: Enable Proxmox no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] }} pve-no-subscription"
    state: present
    filename: pve-no-subscription
  when: not proxmox_enterprise_repo

# --- Subscription nag removal ---

- name: Deploy Proxmox nag removal script
  ansible.builtin.copy:
    src: remove-proxmox-nag.sh
    dest: /usr/local/bin/remove-proxmox-nag.sh
    mode: "0755"
  when: not proxmox_enterprise_repo
  notify: remove-proxmox-nag

- name: Deploy apt hook to re-apply nag removal after package updates
  ansible.builtin.copy:
    content: |
      DPkg::Post-Invoke {
          "if [ -x /usr/local/bin/remove-proxmox-nag.sh ]; then /usr/local/bin/remove-proxmox-nag.sh; fi";
      };
    dest: /etc/apt/apt.conf.d/80-remove-proxmox-nag
    mode: "0644"
  when: not proxmox_enterprise_repo

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Proxmox utilities
  ansible.builtin.apt:
    name:
      - lm-sensors
      - ethtool
      - iotop
    state: present

# --- ZFS ---

- name: Configure ZFS scrub schedule
  ansible.builtin.cron:
    name: "ZFS scrub {{ zfs_pool | default('rpool') }}"
    job: "/sbin/zpool scrub {{ zfs_pool | default('rpool') }}"
    special_time: "{{ proxmox_zfs_scrub_schedule }}"
    user: root
    state: present
  when: zfs_pool is defined

# --- GPU sharing (LXC device passthrough) ---
# Modern approach: kernel 6.17+ has inbox amdgpu driver.
# Host only needs firmware blobs + udev rules. ROCm userspace is installed
# inside the LXC by the docker_host role (configure-guests.yml).

- name: Ensure Proxmox firmware is installed (contains AMD GPU firmware)
  ansible.builtin.apt:
    name: pve-firmware
    state: present
  when: gpu_sharing.enabled | default(false)

- name: Deploy GPU udev rules
  ansible.builtin.copy:
    content: |
      # Managed by Ansible — GPU device permissions for LXC passthrough
      SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="render", MODE="0660"
      KERNEL=="kfd", GROUP="render", MODE="0660"
    dest: /etc/udev/rules.d/70-amdgpu.rules
    mode: "0644"
  when: gpu_sharing.enabled | default(false)
  notify: reload-udev

- name: Ensure root is in render and video groups
  ansible.builtin.user:
    name: root
    groups:
      - render
      - video
    append: true
  when: gpu_sharing.enabled | default(false)
