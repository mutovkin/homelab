---
# Provision VMs and LXC containers on a Proxmox host
# Uses community.proxmox.proxmox_kvm for VMs and community.proxmox.proxmox for LXCs
# Both modules are idempotent — they check if the vmid exists before creating

# --- LXC template auto-resolution ---
# LXC definitions can use `os: ubuntu-24.04` instead of a hardcoded ostemplate.
# This pre-task resolves the latest available template for each OS, downloads
# it if missing, and builds a lookup dict (resolved_templates) for provisioning.

- name: Refresh Proxmox appliance list
  ansible.builtin.command: pveam update
  changed_when: false

- name: Collect unique OS names from LXC definitions
  ansible.builtin.set_fact:
    lxc_os_names: "{{ proxmox_lxcs | selectattr('os', 'defined') | map(attribute='os') | unique | list }}"

- name: Resolve latest template for each OS
  ansible.builtin.shell: |
    set -o pipefail
    pveam available --section system | grep '{{ proxmox_templates[item] }}' | tail -1 | awk '{print $2}'
  register: template_resolution
  changed_when: false
  loop: "{{ lxc_os_names }}"
  when: lxc_os_names | length > 0

- name: Build resolved templates lookup
  ansible.builtin.set_fact:
    resolved_templates: "{{ resolved_templates | default({}) | combine({item.item: 'local:vztmpl/' + item.stdout}) }}"
  loop: "{{ template_resolution.results | default([]) }}"
  when:
    - template_resolution.results is defined
    - item.stdout | default('') | length > 0

- name: Check which templates are already downloaded
  ansible.builtin.stat:
    path: "/var/lib/vz/template/cache/{{ item.stdout }}"
  register: template_cache_check
  loop: "{{ template_resolution.results | default([]) }}"
  when:
    - template_resolution.results is defined
    - item.stdout | default('') | length > 0

- name: Download missing LXC templates
  ansible.builtin.command: "pveam download local {{ item.item.stdout }}"
  loop: "{{ template_cache_check.results | default([]) }}"
  when:
    - template_cache_check.results is defined
    - not (item.stat.exists | default(true))
  loop_control:
    label: "{{ item.item.stdout | default('unknown') }}"

# --- VM provisioning ---

- name: Provision virtual machines
  become: false
  community.proxmox.proxmox_kvm:
    api_host: "{{ ansible_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    cores: "{{ item.cores | default(proxmox_vm_defaults.cores) }}"
    sockets: "{{ item.sockets | default(proxmox_vm_defaults.sockets) }}"
    memory: "{{ item.memory | default(proxmox_vm_defaults.memory) }}"
    bios: "{{ item.bios | default(proxmox_vm_defaults.bios) }}"
    machine: "{{ item.machine | default(proxmox_vm_defaults.machine) }}"
    onboot: "{{ item.onboot | default(proxmox_vm_defaults.onboot) }}"
    scsihw: virtio-scsi-single
    scsi: "{{ item.scsi | default({}) }}"
    net: "{{ item.net | default({'net0': 'virtio,bridge=' + (item.net_bridge | default(proxmox_vm_defaults.net_bridge))}) }}"
    hostpci: "{{ item.hostpci | default({}) }}"
    efidisk0: "{{ item.efidisk0 | default(omit) }}"
    tags: "{{ item.tags | default([]) }}"
    description: "{{ item.description | default('') }}"
    state: present
  delegate_to: localhost
  loop: "{{ proxmox_vms }}"
  loop_control:
    label: "VM {{ item.vmid }} ({{ item.name }})"

- name: Start virtual machines
  become: false
  community.proxmox.proxmox_kvm:
    api_host: "{{ ansible_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.vmid }}"
    state: started
  delegate_to: localhost
  loop: "{{ proxmox_vms | selectattr('started', 'defined') | selectattr('started', 'equalto', true) | list + proxmox_vms | rejectattr('started', 'defined') | list }}"
  loop_control:
    label: "VM {{ item.vmid }} ({{ item.name }})"

- name: Provision LXC containers
  become: false
  community.proxmox.proxmox:
    api_host: "{{ ansible_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.vmid }}"
    hostname: "{{ item.hostname }}"
    ostemplate: "{{ resolved_templates[item.os] | default(item.ostemplate | default(proxmox_lxc_defaults.ostemplate)) }}"
    cores: "{{ item.cores | default(proxmox_lxc_defaults.cores) }}"
    memory: "{{ item.memory | default(proxmox_lxc_defaults.memory) }}"
    swap: "{{ item.swap | default(proxmox_lxc_defaults.swap) }}"
    storage: "{{ item.storage | default(proxmox_lxc_defaults.storage) }}"
    disk: "{{ item.storage | default(proxmox_lxc_defaults.storage) }}:{{ item.root_disk_size | default(proxmox_lxc_defaults.root_disk_size) }}"
    mounts: "{{ item.mounts | default({}) }}"
    netif: "{{ item.netif | default({'net0': 'name=eth0,bridge=' + (item.net_bridge | default(proxmox_lxc_defaults.net_bridge)) + ',ip=dhcp'}) }}"
    onboot: "{{ item.onboot | default(proxmox_lxc_defaults.onboot) }}"
    unprivileged: "{{ item.unprivileged | default(proxmox_lxc_defaults.unprivileged) }}"
    features:
      - "nesting={{ item.nesting | default(proxmox_lxc_defaults.nesting) | ternary('1', '0') }}"
      - "keyctl=1"
    tags: "{{ item.tags | default([]) }}"
    description: "{{ item.description | default('') }}"
    state: present
  delegate_to: localhost
  loop: "{{ proxmox_lxcs }}"
  loop_control:
    label: "CT {{ item.vmid }} ({{ item.hostname }})"

- name: Start LXC containers
  become: false
  community.proxmox.proxmox:
    api_host: "{{ ansible_host }}"
    api_user: "{{ vault_proxmox_api_user }}"
    api_token_id: "{{ vault_proxmox_api_token_id }}"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.vmid }}"
    state: started
  delegate_to: localhost
  loop: "{{ proxmox_lxcs | selectattr('started', 'defined') | selectattr('started', 'equalto', true) | list + proxmox_lxcs | rejectattr('started', 'defined') | list }}"
  loop_control:
    label: "CT {{ item.vmid }} ({{ item.hostname }})"

- name: Configure GPU device sharing for LXC containers
  ansible.builtin.include_tasks: lxc-gpu-passthrough.yml
  loop: "{{ proxmox_lxcs | selectattr('gpu_sharing', 'defined') | selectattr('gpu_sharing', 'equalto', true) | list }}"
  loop_control:
    label: "CT {{ item.vmid }} ({{ item.hostname }}) — GPU sharing"
