---
# Configure GPU device sharing for an LXC container
#
# Bind-mounts /dev/dri (VAAPI hw encoding/decoding) and /dev/kfd (ROCm compute)
# from the Proxmox host into the LXC container. This runs on the HOST and
# modifies /etc/pve/lxc/<vmid>.conf.
#
# Prerequisites (managed by proxmox_host role, gpu_sharing.enabled):
#   1. pve-firmware package installed
#   2. amdgpu kernel module loaded (inbox in kernel 6.17+)
#   3. udev rules deployed (/etc/udev/rules.d/70-amdgpu.rules)
#
# ROCm userspace is installed inside the LXC by the docker_host role
# (configure-guests.yml) — not on the Proxmox host.
#
# Reference: docs/n5pro.md § GPU Passthrough

- name: "Verify /dev/dri exists on host — CT {{ item.vmid }}"
  ansible.builtin.stat:
    path: /dev/dri
  register: dev_dri
  failed_when: not dev_dri.stat.exists

- name: "Check if /dev/kfd exists on host (ROCm) — CT {{ item.vmid }}"
  ansible.builtin.stat:
    path: /dev/kfd
  register: dev_kfd

- name: "Get /dev/kfd major:minor numbers in decimal — CT {{ item.vmid }}"
  ansible.builtin.shell: "read -r major minor < <(stat -c '%t %T' /dev/kfd) && printf '%d:%d' \"0x$major\" \"0x$minor\""
  args:
    executable: /bin/bash
  register: dev_kfd_major_minor
  changed_when: false
  when: dev_kfd.stat.exists

- name: "Add GPU DRI passthrough to LXC config — CT {{ item.vmid }}"
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ item.vmid }}.conf"
    line: "{{ dri_line }}"
  loop:
    - "lxc.cgroup2.devices.allow: c 226:* rwm"
    - "lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir"
  loop_control:
    loop_var: dri_line
  register: lxc_dri_update

- name: "Add GPU KFD passthrough to LXC config — CT {{ item.vmid }}"
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ item.vmid }}.conf"
    line: "{{ kfd_line }}"
  loop:
    - "lxc.cgroup2.devices.allow: c {{ dev_kfd_major_minor.stdout | default('') }} rwm"
    - "lxc.mount.entry: /dev/kfd dev/kfd none bind,optional,create=file"
  loop_control:
    loop_var: kfd_line
  when: dev_kfd.stat.exists
  register: lxc_kfd_update

- name: "Restart LXC to apply GPU passthrough — CT {{ item.vmid }}"
  ansible.builtin.command: "pct reboot {{ item.vmid }}"
  changed_when: true
  when: (lxc_dri_update.changed or (lxc_kfd_update is defined and lxc_kfd_update.changed))
