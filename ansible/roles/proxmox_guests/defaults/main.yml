---
# defaults for proxmox_guests role
proxmox_vms: []
proxmox_lxcs: []

# TrueNAS ISO version — single source of truth. Bump this one value to upgrade;
# the download URL/dest and the existence-check path all derive from it so they
# cannot drift apart. The VM's ide2 cdrom reference in n5pro host_vars uses the
# same filename.
truenas_iso_version: "26.0.0-BETA.2"
truenas_iso_filename: "TrueNAS-{{ truenas_iso_version }}.iso"
# Upstream channel directory. BETA releases live under TrueNAS-26-BETA; a stable
# release lives under a different path, so bump this together with the version
# when changing channels (it does not derive from the version).
truenas_iso_channel: "TrueNAS-26-BETA"
truenas_iso_base_url: "https://iso.sys.truenas.net/{{ truenas_iso_channel }}"
# Published SHA256 (the .iso.sha256 sidecar at iso.sys.truenas.net). Update
# alongside truenas_iso_version. Used to verify the download so a corrupt or
# partial file is re-fetched / fails loudly instead of being trusted forever.
truenas_iso_sha256: "8a6ad50e5ad56092bd017621d45c4e442d24b5d0e3eecf916e0295c81724f47b"

# Template patterns for auto-resolution via `pveam available`
# LXC definitions use `os: ubuntu-24.04` — the role resolves the latest
# matching template and downloads it automatically.
proxmox_templates:
  debian-13: "debian-13-standard"
  debian-12: "debian-12-standard"
  ubuntu-24.04: "ubuntu-24.04-standard"
  ubuntu-22.04: "ubuntu-22.04-standard"

# Default VM settings
proxmox_vm_defaults:
  cores: 2
  sockets: 1
  memory: 2048
  disk_size: 32
  storage: local-zfs
  bios: seabios
  machine: q35
  net_bridge: vmbr0
  net_model: virtio
  onboot: true
  started: true

# Default LXC settings
proxmox_lxc_defaults:
  cores: 2
  memory: 2048
  swap: 512
  root_disk_size: 8
  storage: local-zfs
  ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
  net_bridge: vmbr0
  onboot: true
  started: true
  nesting: false
  unprivileged: true
  gpu_sharing: false
